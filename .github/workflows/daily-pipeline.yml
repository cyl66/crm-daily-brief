name: CRM Daily Brief Pipeline

on:
  schedule:
    - cron: '0 1 * * 1-5'  # UTC 01:00 = 北京时间 09:00 工作日
  workflow_dispatch:

jobs:
  generate-brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python src/main.py

      - name: Commit and push archive
        run: |
          git config user.name "CRM Daily Brief Bot"
          git config user.email "bot@crm-daily-brief"
          git add archive/ latest.json data/
          git diff --staged --quiet || (git commit -m "📋 日报归档 $(date +%Y-%m-%d)" && git push)
