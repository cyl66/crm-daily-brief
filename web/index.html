<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>行业资讯</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f5f5f7;--surface:#fff;--surface-hover:#fafafa;
  --text:#1d1d1f;--text2:#6e6e73;--text3:#aeaeb2;
  --blue:#0071e3;--blue-bg:rgba(0,113,227,.06);
  --green:#34c759;--orange:#ff9f0a;--red:#ff3b30;
  --purple:#af52de;--teal:#5ac8fa;--pink:#ff2d55;
  --border:rgba(0,0,0,.07);
  --shadow-sm:0 1px 3px rgba(0,0,0,.04);
  --shadow-md:0 4px 20px rgba(0,0,0,.06);
  --r:16px;--rp:100px;--t:.22s cubic-bezier(.25,.1,.25,1);
}

body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',sans-serif;
  background:var(--bg);color:var(--text);line-height:1.5;
  -webkit-font-smoothing:antialiased;min-height:100vh;
}
.page{max-width:840px;margin:0 auto;padding:44px 24px 80px}

/* ── Hero ── */
.hero{margin-bottom:32px}
.hero h1{font-size:34px;font-weight:700;letter-spacing:-.6px;line-height:1.15}
.hero .sub{font-size:15px;color:var(--text2);margin-top:6px;font-weight:450}

/* ── Filter Bar ── */
.filter-bar{
  background:rgba(255,255,255,.76);
  backdrop-filter:blur(28px) saturate(180%);
  -webkit-backdrop-filter:blur(28px) saturate(180%);
  border:1px solid var(--border);
  border-radius:var(--r);padding:14px 16px 16px;margin-bottom:28px;
  box-shadow:var(--shadow-sm);
}

.presets{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.presets button{
  padding:6px 14px;border:none;border-radius:var(--rp);
  font-size:13px;font-weight:500;color:var(--text2);
  background:rgba(0,0,0,.035);cursor:pointer;
  transition:var(--t);font-family:inherit;white-space:nowrap;
}
.presets button:hover{background:rgba(0,0,0,.06);color:var(--text)}
.presets button.active{background:var(--text);color:#fff;font-weight:600}

.search-row{
  display:flex;gap:8px;align-items:center;margin-top:12px;
  padding-top:12px;border-top:1px solid var(--border);
}
.search-wrap{flex:1;position:relative;display:flex;align-items:center}
.search-row input{
  width:100%;border:none;background:rgba(0,0,0,.03);border-radius:var(--rp);
  padding:9px 36px 9px 16px;font-size:13px;font-family:inherit;outline:none;
  color:var(--text);transition:var(--t);
}
.search-row input:focus{background:rgba(0,0,0,.055)}
.search-row input::placeholder{color:var(--text3)}
.search-clear{
  position:absolute;right:11px;cursor:pointer;
  font-size:13px;color:var(--text3);padding:2px 5px;
  border-radius:50%;line-height:1;user-select:none;
  transition:all var(--t);
}
.search-clear:hover{color:var(--text);background:rgba(0,0,0,.06)}
.search-row button{
  padding:9px 20px;border:none;border-radius:var(--rp);
  font-size:13px;font-weight:600;cursor:pointer;
  font-family:inherit;transition:var(--t);
}
.btn-go{background:var(--blue);color:#fff}
.btn-go:hover{opacity:.88}

/* ── Tab Navigation ── */
.tab-nav{
  position:sticky;top:0;z-index:10;
  display:flex;gap:2px;padding:6px;
  background:rgba(245,245,247,.88);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border:1px solid var(--border);
  border-radius:var(--r);margin-bottom:20px;
  box-shadow:0 1px 3px rgba(0,0,0,.03);
}
.tab-nav button{
  display:flex;align-items:center;gap:6px;
  padding:8px 12px;border:none;background:transparent;
  border-radius:11px;cursor:pointer;transition:all var(--t);
  font-size:13px;font-weight:500;color:var(--text2);
  white-space:nowrap;flex:1;justify-content:center;
}
.tab-nav button:hover{background:rgba(0,0,0,.04);color:var(--text)}
.tab-nav button.active{
  background:var(--surface);color:var(--text);
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.tab-ico{width:16px;height:16px;display:flex;flex-shrink:0}
.tab-ico svg{width:100%;height:100%}
.tab-nav button.active .tab-ico svg{stroke-width:2.5}

/* ── Section Card ── */
.section{
  background:var(--surface);border-radius:var(--r);
  margin-bottom:14px;overflow:hidden;
  border:1px solid var(--border);
  box-shadow:var(--shadow-sm);
  transition:box-shadow var(--t);
  scroll-margin-top:64px;
}
.section:hover{box-shadow:var(--shadow-md)}
.section-head{
  display:flex;align-items:center;gap:12px;
  padding:18px 22px;cursor:pointer;
  user-select:none;transition:background var(--t);
}
.section-head:hover{background:var(--surface-hover)}
.section-head .ico{width:22px;height:22px;flex-shrink:0;opacity:.8}
.section-head .label{font-size:16px;font-weight:600;letter-spacing:-.2px;flex:1}
.section-head .chevron{font-size:11px;color:var(--text3);transition:transform var(--t)}
.section-body{padding:0 22px 22px;display:flex;flex-direction:column;gap:10px}

/* ── Article Card ── */
.item{
  background:var(--bg);border-radius:12px;
  padding:14px 16px;border:1px solid var(--border);
  transition:all var(--t);animation:in .35s ease both;cursor:pointer;
}
.item:hover{border-color:rgba(0,113,227,.15);box-shadow:0 2px 12px rgba(0,0,0,.04)}
@keyframes in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.item-row1{display:flex;align-items:flex-start;gap:8px;margin-bottom:4px}
.item-title{font-size:15px;font-weight:600;line-height:1.4;letter-spacing:-.15px;color:var(--text);text-decoration:none;flex:1}
.item-title:hover{color:var(--blue)}
.item-summary{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:10px}
.item-source{font-size:12px;color:var(--text3);font-weight:400;white-space:nowrap}
.item-sep{width:1px;height:14px;background:var(--border);flex-shrink:0;align-self:center}
.item-row2{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

.tag{font-size:11px;font-weight:500;padding:3px 10px;border-radius:var(--rp);letter-spacing:.1px}
.tag-cp{background:var(--blue-bg);color:var(--blue)}
.tag-hi{background:rgba(255,159,10,.1);color:#b25e00;font-weight:600}
.tag-neg{background:rgba(255,59,48,.08);color:#c41c14}
.tag-our{background:var(--blue-bg);color:var(--blue);font-weight:600}

.item-url{font-size:12px;color:var(--blue);text-decoration:none;font-weight:500;margin-left:auto;flex-shrink:0;transition:opacity var(--t)}
.item-url:hover{opacity:.65}

.sub-label{font-size:13px;font-weight:600;color:var(--text2);margin:14px 0 8px;padding-left:10px;border-left:2.5px solid var(--border)}

.empty{text-align:center;padding:32px;color:var(--text3);font-size:14px}
.footer{text-align:center;padding:32px 0 0;color:var(--text3);font-size:12px}

@media(max-width:640px){
  .page{padding:28px 14px 60px}
  .hero h1{font-size:26px}
  .presets{gap:4px}
  .presets button{padding:5px 10px;font-size:11px}
  .section-head{padding:14px 16px}
  .section-body{padding:0 14px 14px;gap:8px}
  .item{padding:12px 14px;border-radius:10px}
  .item-title{font-size:14px}
}
</style>
</head>
<body>
<div class="page">

  <div class="hero">
    <h1>行业资讯</h1>
    <div class="sub" id="headerSub">昨日动态</div>
  </div>

  <div class="filter-bar">
    <div class="presets" id="presets">
      <button data-preset="yesterday" class="active">昨日</button>
      <button data-preset="this_week">本周</button>
      <button data-preset="last_week">上周</button>
      <button data-preset="this_month">本月</button>
      <button data-preset="last_month">上月</button>
      <button data-preset="this_quarter">本季</button>
      <button data-preset="last_quarter">上季</button>
      <button data-preset="this_year">本年</button>
      <button data-preset="last_year">上年</button>
    </div>

    <div class="search-row">
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="搜索标题或内容...">
        <span class="search-clear" id="searchClear" onclick="clearSearch()" style="display:none">✕</span>
      </div>
      <button class="btn-go" onclick="doSearch()">查询</button>
    </div>
  </div>

  <div class="tab-nav" id="tabNav">
    <button data-target="A" class="active"><span class="tab-ico" style="color:var(--blue)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span><span class="tab-label">CRM行业</span></button>
    <button data-target="B"><span class="tab-ico" style="color:var(--orange)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--orange)" stroke-width="2"><path d="M5 17h2l1-7h8l1 7h2"/><circle cx="8" cy="20" r="1.5"/><circle cx="17" cy="20" r="1.5"/></svg></span><span class="tab-label">汽车行业</span></button>
    <button data-target="C"><span class="tab-ico" style="color:var(--pink)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--pink)" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg></span><span class="tab-label">品牌舆情</span></button>
    <button data-target="D"><span class="tab-ico" style="color:var(--purple)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--purple)" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></span><span class="tab-label">政策法规</span></button>
    <button data-target="E"><span class="tab-ico" style="color:var(--teal)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span><span class="tab-label">数字营销</span></button>
    <button data-target="F"><span class="tab-ico" style="color:var(--green)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 22c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg></span><span class="tab-label">消费者洞察</span></button>
  </div>

  <div id="content"></div>
  <div class="footer">CRM 行业日报 · 数据驱动决策</div>
</div>

<script>
const SECTIONS={
  A:{name:'CRM行业动态',color:'var(--blue)'},
  B:{name:'汽车行业动态',color:'var(--orange)'},
  C:{name:'汽车品牌舆情',color:'var(--pink)'},
  D:{name:'政策法规速递',color:'var(--purple)'},
  E:{name:'数字营销',color:'var(--teal)'},
  F:{name:'消费者购车洞察',color:'var(--green)'}
};

const ARCHIVE='archive/';
const DATA_URL='latest.json';

let startDate='',endDate='';

/* ── Helpers ── */
const pad=n=>String(n).padStart(2,'0');
const fmt=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const today=()=>new Date();
const yesterday=()=>{const d=today();d.setDate(d.getDate()-1);return d};

/* ── Init ── */
document.addEventListener('DOMContentLoaded',()=>{
  applyPreset('yesterday');

  document.querySelectorAll('#presets button[data-preset]').forEach(btn=>{
    btn.addEventListener('click',function(){
      applyPreset(this.dataset.preset);
      loadData();
    });
  });

  document.getElementById('searchInput').addEventListener('keydown',e=>{
    if(e.key==='Enter') doSearch();
  });
  document.getElementById('searchInput').addEventListener('input',function(){
    document.getElementById('searchClear').style.display=this.value.trim()?'block':'none';
  });

  loadData();
});

function clearSearch(){
  document.getElementById('searchInput').value='';
  document.getElementById('searchClear').style.display='none';
  loadData();
}
function doSearch(){loadData()}

/* ── Date ── */
function applyPreset(preset){
  document.querySelectorAll('#presets button[data-preset]').forEach(b=>b.classList.remove('active'));
  const btn=document.querySelector(`#presets button[data-preset="${preset}"]`);
  if(btn) btn.classList.add('active');

  const now=today(),y=yesterday(),yest=fmt(y);

  switch(preset){
    case'yesterday':startDate=endDate=yest;document.getElementById('headerSub').textContent='昨日动态';break;
    case'this_week':{
      const mon=new Date(now);mon.setDate(now.getDate()-(now.getDay()||7)+1);
      startDate=fmt(mon);endDate=yest;
      document.getElementById('headerSub').textContent='本周动态';break;
    }
    case'last_week':{
      const lm=new Date(now);lm.setDate(now.getDate()-(now.getDay()||7)-6);
      const ls=new Date(lm);ls.setDate(ls.getDate()+6);
      startDate=fmt(lm);endDate=fmt(ls);
      document.getElementById('headerSub').textContent='上周动态';break;
    }
    case'this_month':
      startDate=fmt(new Date(now.getFullYear(),now.getMonth(),1));endDate=yest;
      document.getElementById('headerSub').textContent='本月动态';break;
    case'last_month':
      startDate=fmt(new Date(now.getFullYear(),now.getMonth()-1,1));
      endDate=fmt(new Date(now.getFullYear(),now.getMonth(),0));
      document.getElementById('headerSub').textContent='上月动态';break;
    case'this_quarter':{
      const tq=Math.floor(now.getMonth()/3)*3;
      startDate=fmt(new Date(now.getFullYear(),tq,1));endDate=yest;
      document.getElementById('headerSub').textContent='本季度动态';break;
    }
    case'last_quarter':{
      const lq=Math.floor(now.getMonth()/3)*3-3;
      const yr=now.getFullYear()+Math.floor(lq/12),mo=((lq%12)+12)%12;
      startDate=fmt(new Date(yr,mo,1));endDate=fmt(new Date(yr,mo+3,0));
      document.getElementById('headerSub').textContent='上季度动态';break;
    }
    case'this_year':
      startDate=fmt(new Date(now.getFullYear(),0,1));endDate=yest;
      document.getElementById('headerSub').textContent='本年度动态';break;
    case'last_year':
      startDate=fmt(new Date(now.getFullYear()-1,0,1));
      endDate=fmt(new Date(now.getFullYear()-1,11,31));
      document.getElementById('headerSub').textContent='上年度动态';break;
  }
}

/* ── Data ── */
async function loadData(){
  const term=document.getElementById('searchInput').value.trim().toLowerCase();
  let brief;
  const isMulti=startDate!==endDate;

  if(!isMulti){
    const resp=await fetch(`${ARCHIVE}${startDate}.json`);
    if(resp.ok){
      brief=await resp.json();
    }else{
      const r2=await fetch(DATA_URL);
      if(r2.ok) brief=await r2.json();
      else{brief=null}
    }
  }else{
    brief=await aggregate(startDate,endDate);
  }

  if(!brief){
    brief={sections:{}};
    ['A','B','C','D','E','F'].forEach(k=>{brief.sections[k]={items:[]}});
  }
  if(term) brief=filterBrief(brief,term);
  render(brief);
}

async function aggregate(s,e){
  const secs={};['A','B','C','D','E','F'].forEach(k=>secs[k]={items:[]});
  let days=0;
  const st=new Date(s+'T00:00:00'),et=new Date(e+'T00:00:00');
  for(let d=new Date(st);d<=et;d.setDate(d.getDate()+1)){
    const ds=fmt(d);
    const resp=await fetch(`${ARCHIVE}${ds}.json`);
    if(!resp.ok) continue;
    const daily=await resp.json();days++;
    for(const k of['A','B','C','D','E','F']){
      const items=daily.sections?.[k]?.items||[];
      items.forEach(i=>{i._date=ds});
      secs[k].items.push(...items);
    }
  }
  let total=0;
  for(const k of['A','B','C','D','E','F']){
    secs[k].items.sort((a,b)=>(b._date||'').localeCompare(a._date||'')||(b.importance_score||0)-(a.importance_score||0));
    total+=secs[k].items.length;
  }
  return {sections:secs,total_articles:total,days_covered:days};
}

function filterBrief(b,term){
  const f=JSON.parse(JSON.stringify(b));
  for(const k of['A','B','C','D','E','F']){
    f.sections[k].items=f.sections[k].items.filter(i=>(i.title||'').toLowerCase().includes(term)||(i.summary||'').toLowerCase().includes(term));
  }
  return f;
}

/* ── Render ── */
function render(brief){
  let h='';
  for(const k of['A','B','C','D','E','F']){
    const cfg=SECTIONS[k],items=brief.sections?.[k]?.items||[];
    h+=`<div class="section" id="section-${k}">
      <div class="section-head" onclick="toggleSection(this)"><span class="ico" style="color:${cfg.color}"><svg viewBox="0 0 24 24" fill="none" stroke="${cfg.color}" stroke-width="2"><rect x="6" y="4" width="12" height="16" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="12" y2="17"/></svg></span><span class="label">${cfg.name}</span><span class="chevron">▼</span></div>
      <div class="section-body">`;
    if(!items.length){h+='<div class="empty">暂无相关动态</div>'}
    else if(k==='C'){h+=renderC(items)}
    else{items.forEach(i=>{h+=renderItem(i)})}
    h+='</div></div>';
  }
  document.getElementById('content').innerHTML=h;
  setupTabs();
}

function renderC(items){
  let h='';
  const our=items.filter(i=>i.is_our_brand&&i.sentiment==='negative');
  const comp=items.filter(i=>!i.is_our_brand&&i.sentiment==='negative');
  if(our.length){h+='<div class="sub-label">本品舆情</div>';our.forEach(i=>h+=renderItem(i))}
  if(comp.length){h+='<div class="sub-label">竞品舆情</div>';comp.forEach(i=>h+=renderItem(i))}
  if(!our.length&&!comp.length) h+='<div class="empty">暂无负面舆情</div>';
  return h;
}

function renderItem(item){
  const tags=[];
  if(item.importance_level==='high') tags.push('<span class="tag tag-hi">高优</span>');
  if(item.sentiment==='negative') tags.push('<span class="tag tag-neg">负面</span>');
  if(item.is_our_brand) tags.push('<span class="tag tag-our">本品</span>');
  (item.companies||[]).forEach(c=>tags.push(`<span class="tag tag-cp">${c}</span>`));
  let src='';
  const dt=item.published_at||item._date||'';
  if(item.source||dt) src=`<span class="item-source">${item.source||''}${item.source&&dt?' · ':''}${dt||''}</span>`;
  let sum='';
  if(item.summary) sum=item.summary.length>100?item.summary.slice(0,97)+'...':item.summary;
  const url=item.url||'#';
  return`<div class="item" onclick="var a=this.querySelector('a');a?window.open(a.href,'_blank'):window.open('${url}','_blank')">
    <div class="item-row1"><a class="item-title" href="${url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${item.title||'(无标题)'}</a></div>
    ${sum?`<div class="item-summary">${sum}</div>`:''}
    <div class="item-row2">${tags.join('')}${src?`<span class="item-sep"></span>`+src:''}<a class="item-url" href="${url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">查看原文 →</a></div>
  </div>`;
}

function toggleSection(head){
  const body=head.nextElementSibling,chev=head.querySelector('.chevron');
  if(body.style.display==='none'){body.style.display='';chev.style.transform=''}
  else{body.style.display='none';chev.style.transform='rotate(-90deg)'}
}

function setupTabs(){
  const tabs=document.querySelectorAll('#tabNav button[data-target]');
  tabs.forEach(btn=>{
    btn.onclick=()=>{
      const el=document.getElementById('section-'+btn.dataset.target);
      if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
    };
  });
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        tabs.forEach(b=>b.classList.remove('active'));
        const t=document.querySelector('#tabNav button[data-target="'+e.target.id.replace('section-','')+'"]');
        if(t) t.classList.add('active');
      }
    });
  },{rootMargin:'-60px 0px -70% 0px',threshold:0});
  ['A','B','C','D','E','F'].forEach(k=>{
    const el=document.getElementById('section-'+k);if(el) obs.observe(el);
  });
}
</script>
</body>
</html>
